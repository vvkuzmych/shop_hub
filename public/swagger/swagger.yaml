openapi: 3.0.1
info:
  title: ShopHub API
  version: 1.0.0
  description: |
    E-commerce REST API with JWT authentication, product management, shopping cart, orders, and admin panel.
    
    ## Authentication
    Most endpoints require JWT authentication. Include the token in the Authorization header:
    ```
    Authorization: Bearer YOUR_JWT_TOKEN
    ```
    
    ## Pagination
    List endpoints support pagination via query parameters:
    - `page` - Page number (default: 1)
    - `per_page` - Items per page (default: 20)
    
  contact:
    name: ShopHub API Support
    email: api@shophub.example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://api.shophub.example.com
    description: Production server

tags:
  - name: Authentication
    description: User authentication endpoints (signup, login, logout, password reset)
  - name: Products
    description: Product browsing, search, and filtering
  - name: Shopping Cart
    description: Cart management operations
  - name: Orders
    description: Order placement and history
  - name: Categories
    description: Product category browsing
  - name: Reviews
    description: Product reviews and ratings
  - name: Admin - Products
    description: Admin product management
  - name: Admin - Categories
    description: Admin category management
  - name: Admin - Orders
    description: Admin order management
  - name: Admin - Users
    description: Admin user management

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from login endpoint
  
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: "user@example.com"
        first_name:
          type: string
          example: "John"
        last_name:
          type: string
          example: "Doe"
        role:
          type: string
          enum: [customer, admin]
          example: "customer"
        created_at:
          type: string
          format: date-time
      required:
        - email
        - role
    
    Product:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Laptop"
        description:
          type: string
          example: "High-performance laptop"
        price:
          type: number
          format: float
          example: 999.99
        stock:
          type: integer
          example: 50
        sku:
          type: string
          example: "LAPTOP-001"
        active:
          type: boolean
          example: true
        featured:
          type: boolean
          example: false
        category_id:
          type: integer
          example: 1
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - name
        - price
        - category_id
    
    Category:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Electronics"
        description:
          type: string
        parent_id:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
      required:
        - name
    
    Order:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 1
        status:
          type: string
          enum: [pending, confirmed, shipped, delivered, cancelled]
          example: "pending"
        total_amount:
          type: number
          format: float
          example: 159.98
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - status
        - total_amount
    
    CartItem:
      type: object
      properties:
        id:
          type: integer
          example: 1
        product_id:
          type: integer
          example: 1
        quantity:
          type: integer
          example: 2
        price:
          type: number
          format: float
          example: 29.99
        subtotal:
          type: number
          format: float
          example: 59.98
      required:
        - product_id
        - quantity
    
    Review:
      type: object
      properties:
        id:
          type: integer
          example: 1
        product_id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 1
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 5
        comment:
          type: string
          example: "Great product!"
        created_at:
          type: string
          format: date-time
      required:
        - rating
    
    Error:
      type: object
      properties:
        error:
          type: string
          example: "Unauthorized"
        errors:
          type: array
          items:
            type: string
          example: ["Invalid credentials"]

paths:
  # Authentication Endpoints
  /api/v1/signup:
    post:
      tags:
        - Authentication
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                      format: password
                    password_confirmation:
                      type: string
                      format: password
                    first_name:
                      type: string
                    last_name:
                      type: string
                  required:
                    - email
                    - password
                    - password_confirmation
      responses:
        '200':
          description: User created successfully
          headers:
            Authorization:
              description: JWT token
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      code:
                        type: integer
                        example: 200
                      message:
                        type: string
                        example: "Signed up successfully."
                  data:
                    $ref: '#/components/schemas/User'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /api/v1/login:
    post:
      tags:
        - Authentication
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                      format: password
                  required:
                    - email
                    - password
      responses:
        '200':
          description: Logged in successfully
          headers:
            Authorization:
              description: JWT token
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      code:
                        type: integer
                      message:
                        type: string
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /api/v1/logout:
    delete:
      tags:
        - Authentication
      summary: Logout user
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  message:
                    type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  # Products Endpoints
  /api/v1/products:
    get:
      tags:
        - Products
      summary: List products with filtering and search
      parameters:
        - name: q
          in: query
          description: Search query (name or description)
          schema:
            type: string
        - name: category_id
          in: query
          description: Filter by category
          schema:
            type: integer
        - name: min_price
          in: query
          description: Minimum price
          schema:
            type: number
        - name: max_price
          in: query
          description: Maximum price
          schema:
            type: number
        - name: in_stock
          in: query
          description: Only in-stock products
          schema:
            type: boolean
        - name: featured
          in: query
          description: Only featured products
          schema:
            type: boolean
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          description: Items per page
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Products retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
                  meta:
                    type: object
                    properties:
                      current_page:
                        type: integer
                      total_pages:
                        type: integer
                      total_count:
                        type: integer
                      per_page:
                        type: integer
  
  /api/v1/products/{id}:
    get:
      tags:
        - Products
      summary: Get product details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Product'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /api/v1/products/search:
    get:
      tags:
        - Products
      summary: Search products
      parameters:
        - name: q
          in: query
          description: Search keyword
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
  
  /api/v1/products/featured:
    get:
      tags:
        - Products
      summary: Get featured products
      parameters:
        - name: limit
          in: query
          description: Maximum number of products
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Featured products
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
  
  # Shopping Cart Endpoints
  /api/v1/cart/items:
    get:
      tags:
        - Shopping Cart
      summary: View cart items
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Cart items retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/CartItem'
                  total:
                    type: number
                    format: float
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /api/v1/cart/add_item:
    post:
      tags:
        - Shopping Cart
      summary: Add item to cart
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                product_id:
                  type: integer
                quantity:
                  type: integer
                  minimum: 1
              required:
                - product_id
                - quantity
      responses:
        '200':
          description: Item added to cart
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  cart_item:
                    $ref: '#/components/schemas/CartItem'
        '422':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /api/v1/cart/update_quantity:
    patch:
      tags:
        - Shopping Cart
      summary: Update cart item quantity
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                product_id:
                  type: integer
                quantity:
                  type: integer
                  minimum: 1
              required:
                - product_id
                - quantity
      responses:
        '200':
          description: Quantity updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  cart_item:
                    $ref: '#/components/schemas/CartItem'
        '404':
          description: Item not in cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /api/v1/cart/remove_item:
    delete:
      tags:
        - Shopping Cart
      summary: Remove item from cart
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                product_id:
                  type: integer
              required:
                - product_id
      responses:
        '200':
          description: Item removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /api/v1/cart/clear:
    delete:
      tags:
        - Shopping Cart
      summary: Clear entire cart
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Cart cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  # Orders Endpoints
  /api/v1/orders:
    get:
      tags:
        - Orders
      summary: List user's orders
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Orders retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    post:
      tags:
        - Orders
      summary: Create a new order
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      product_id:
                        type: integer
                      quantity:
                        type: integer
                    required:
                      - product_id
                      - quantity
              required:
                - items
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Order'
        '422':
          description: Invalid order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /api/v1/orders/{id}:
    get:
      tags:
        - Orders
      summary: Get order details
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Order'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  
  /api/v1/orders/{id}/cancel:
    patch:
      tags:
        - Orders
      summary: Cancel a pending order
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Order cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Order'
        '422':
          description: Cannot cancel order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
