services:
  db:
    image: postgres:16-alpine
    container_name: shophub_db_prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: shop_hub_production
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - shophub_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shophub_redis_prod
    volumes:
      - redis_prod_data:/data
    networks:
      - shophub_network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shophub_backend_prod
    environment:
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@db:5432/shop_hub_production
      REDIS_URL: redis://redis:6379/0
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_SERVE_STATIC_FILES: "false"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      NOVA_POSHTA_API_KEY: ${NOVA_POSHTA_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shophub_network
    restart: unless-stopped
    expose:
      - "3000"

  sidekiq:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shophub_sidekiq_prod
    command: bundle exec sidekiq
    environment:
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@db:5432/shop_hub_production
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shophub_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: shophub_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites-enabled:/etc/nginx/sites-enabled:ro
      - ./frontend/dist:/var/www/frontend:ro
      - ./public:/var/www/backend/public:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - shophub_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  shophub_network:
    driver: bridge

volumes:
  postgres_prod_data:
  redis_prod_data:
  nginx_cache:
  nginx_logs:
